name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Build prerenders every route to static HTML (real 200s for crawlers)
      # and writes an empty-root dist/404.html fallback for unknown paths.
      - run: npm run build
      # Agent guidance files must never ship with the site
      - run: |
          if find dist \( -name 'AGENTS.md' -o -name 'CLAUDE.md' \) | grep -q .; then
            echo 'Agent guidance files found in dist/' >&2
            exit 1
          fi
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
