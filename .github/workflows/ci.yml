name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run validate
      - run: npm test -- --run
      - run: npm run build
      # Agent guidance files must never ship with the site
      - run: |
          if find dist \( -name 'AGENTS.md' -o -name 'CLAUDE.md' \) | grep -q .; then
            echo 'Agent guidance files found in dist/' >&2
            exit 1
          fi
